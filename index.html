<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEXFORGE X — OS v6</title>

<style>
:root{
  --bg:#0A0A0A;
  --panel:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.1);
  --text:#fff;
  --muted:rgba(255,255,255,0.6);
  --accent:#00F9FF;
  --purple:#7C3AED;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto;}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:10px 0;
}

nav button{
  background:none;
  border:none;
  color:var(--muted);
  font-size:12px;
}

/* PAGES */
.page{display:none;padding:20px;padding-bottom:80px;}
.active{display:block;}

/* CARDS */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

/* HEADER */
h1{font-size:20px;margin:10px 0;}
h2{font-size:16px;margin:10px 0;color:var(--muted);}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,var(--accent),var(--purple));
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:black;
  font-weight:bold;
  width:100%;
}

/* TOGGLE */
.toggle{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  align-items:center;
}

input[type="checkbox"]{
  transform:scale(1.2);
}

/* BANNER */
.banner{
  font-size:13px;
  color:var(--muted);
  text-align:center;
  margin-bottom:10px;
}

/* SMALL */
.small{font-size:12px;color:var(--muted);}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="banner" id="motivation"></div>

  <div class="card">
    <h1>APEXFORGE X</h1>
    <div class="small">Autonomous Fitness OS v6</div>
  </div>

  <div class="card">
    <h2>Today State</h2>
    <div id="state"></div>
  </div>

  <button class="btn" onclick="startSession()">START TRAINING SESSION</button>
</div>

<!-- TRAINING -->
<div id="training" class="page">
  <h1>Training</h1>

  <div class="card">
    <h2>Log Workout</h2>
    <input id="exercise" placeholder="Exercise name" style="width:100%;padding:10px;margin-bottom:8px;">
    <input id="weight" placeholder="Weight" style="width:100%;padding:10px;margin-bottom:8px;">
    <button class="btn" onclick="logWorkout()">Add Set</button>
  </div>

  <div class="card">
    <h2>Sessions</h2>
    <div id="workouts"></div>
  </div>
</div>

<!-- SUPPLEMENTS -->
<div id="supplements" class="page">
  <h1>Supplements</h1>

  <div class="card">
    <div class="toggle">
      <span>Magnesium</span><input type="checkbox" onchange="logSupp(this)">
    </div>
    <div class="toggle">
      <span>Creatine</span><input type="checkbox" onchange="logSupp(this)">
    </div>
    <div class="toggle">
      <span>Electrolytes</span><input type="checkbox" onchange="logSupp(this)">
    </div>
  </div>
</div>

<!-- CYCLE -->
<div id="cycle" class="page">
  <h1>Cycle State</h1>

  <div class="card">
    <h2>Readiness</h2>
    <div id="readiness">--</div>
  </div>

  <div class="card">
    <h2>Fatigue</h2>
    <div id="fatigue">--</div>
  </div>
</div>

<!-- AI -->
<div id="ai" class="page">
  <h1>AI Coach</h1>

  <div class="card">
    <h2>Insight</h2>
    <div id="aiText">Waiting for data...</div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <h1>Settings</h1>

  <div class="card">
    <div class="toggle">
      <span>Motivation Banner</span>
      <input type="checkbox" checked onchange="toggleMotivation(this)">
    </div>

    <div class="toggle">
      <span>Compact Mode</span>
      <input type="checkbox">
    </div>
  </div>
</div>

<!-- NAV -->
<nav>
  <button onclick="show('home')">Home</button>
  <button onclick="show('training')">Train</button>
  <button onclick="show('supplements')">Supp</button>
  <button onclick="show('cycle')">Cycle</button>
  <button onclick="show('ai')">AI</button>
  <button onclick="show('settings')">Settings</button>
</nav>

<script>
let state = {
  fatigue: 40,
  recovery: 70,
  readiness: 65,
  motivation: true,
  workouts: [],
  supps: []
};

/* NAV */
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* MOTIVATION */
const quotes = [
  "Discipline beats motivation.",
  "Small wins build champions.",
  "Train when you don’t feel like it.",
  "Consistency is the real edge."
];

function updateMotivation(){
  if(!state.motivation) {
    document.getElementById("motivation").innerText="";
    return;
  }
  document.getElementById("motivation").innerText =
    quotes[Math.floor(Math.random()*quotes.length)];
}

/* WORKOUT */
function logWorkout(){
  const ex = document.getElementById("exercise").value;
  const w = document.getElementById("weight").value;

  state.workouts.push({ex,w});

  renderWorkouts();
  runAI();
}

function renderWorkouts(){
  document.getElementById("workouts").innerHTML =
    state.workouts.map(w=>`<div class="card">${w.ex} - ${w.w}</div>`).join("");
}

/* SUPPS */
function logSupp(el){
  state.supps.push(el.parentNode.innerText.trim());
  runAI();
}

/* AI ENGINE */
function runAI(){
  let fatigue = state.workouts.length * 5;
  let recovery = 100 - fatigue;

  state.fatigue = fatigue;
  state.recovery = recovery;
  state.readiness = recovery - fatigue/2;

  document.getElementById("fatigue").innerText = state.fatigue;
  document.getElementById("readiness").innerText = state.readiness;

  let msg = "";

  if(state.fatigue > 60){
    msg = "High fatigue detected — reduce training intensity.";
  } else if(state.readiness > 70){
    msg = "High readiness — good window for progression.";
  } else {
    msg = "Stable state — maintain current workload.";
  }

  document.getElementById("aiText").innerText = msg;

  document.getElementById("state").innerText =
    `Readiness: ${state.readiness} | Fatigue: ${state.fatigue}`;
}

/* SESSION */
function startSession(){
  alert("Training session started — focus mode engaged.");
}

/* SETTINGS */
function toggleMotivation(el){
  state.motivation = el.checked;
  updateMotivation();
}

/* INIT */
updateMotivation();
runAI();
</script>

</body>
</html>
