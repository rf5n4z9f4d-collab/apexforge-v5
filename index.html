<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Gym Tracker • Rebuilt Core</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
  --bg:#071822;
  --card:rgba(255,255,255,0.06);
  --accent:#10b981;
  --text:#e5e7eb;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family: Inter, sans-serif;
}

.glass{
  background:var(--card);
  backdrop-filter: blur(14px);
  border:1px solid rgba(255,255,255,0.06);
}

.btn{
  transition:.2s;
}
.btn:active{ transform:scale(.96); }

.tab{ display:none; }
.tab.active{ display:block; }

.card{
  padding:14px;
  border-radius:20px;
}

input,select,textarea{
  outline:none;
}

</style>
</head>

<body class="pb-24">

<!-- HEADER -->
<header class="max-w-md mx-auto p-4 flex justify-between items-center">
  <div>
    <div class="text-2xl font-bold">APEX</div>
    <div class="text-xs text-emerald-400" id="cycleInfo">Week 1 • Day 1</div>
  </div>

  <button onclick="switchTab(2)" class="glass px-4 py-2 rounded-full text-sm btn">
    Settings
  </button>
</header>

<!-- MAIN -->
<main class="max-w-md mx-auto px-4 space-y-4">

<!-- PROGRESS -->
<div class="glass card text-center">
  <div class="text-5xl font-bold text-emerald-400" id="progress">0%</div>
  <div class="text-xs text-gray-400">Daily Completion</div>
</div>

<!-- SCHEDULE -->
<div class="glass card">
  <div class="flex justify-between mb-2">
    <h2 class="font-semibold">Daily Schedule</h2>
  </div>
  <div id="schedule"></div>
</div>

<!-- MACROS -->
<div class="tab" id="tab-1">
  <div class="glass card space-y-2">
    <h2 class="font-semibold">Macros</h2>

    <input id="weight" class="w-full p-2 rounded bg-white/10" placeholder="Weight (lbs)" value="180"/>
    <select id="goal" class="w-full p-2 rounded bg-white/10">
      <option>Cut</option>
      <option selected>Maintain</option>
      <option>Bulk</option>
    </select>

    <button onclick="calcMacros()" class="w-full bg-emerald-500 text-black py-2 rounded-xl btn">
      Calculate
    </button>

    <div class="text-sm mt-2" id="macroOut"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="tab" id="tab-2">
  <div class="glass card space-y-3">
    <h2 class="font-semibold">Settings</h2>

    <input id="cycleStart" type="date" class="w-full p-2 rounded bg-white/10"/>

    <button onclick="saveCycle()" class="w-full bg-emerald-500 text-black py-2 rounded-xl btn">
      Save Cycle
    </button>

    <button onclick="resetData()" class="w-full bg-red-500 py-2 rounded-xl btn">
      Reset Data
    </button>
  </div>
</div>

</main>

<!-- TAB BAR -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass flex justify-around p-3">
  <button onclick="switchTab(0)">Home</button>
  <button onclick="switchTab(1)">Macros</button>
  <button onclick="switchTab(2)">Settings</button>
</footer>

<script>

/* =========================
   STATE SYSTEM (CLEAN CORE)
========================= */

const STORE_KEY = "apex_v_clean";

const defaultState = {
  cycleStart: new Date().toISOString().slice(0,10),
  schedule: [
    {id:1,time:"6:30 AM",name:"Morning Cardio",done:false},
    {id:2,time:"7:30 AM",name:"Meal Prep",done:false},
    {id:3,time:"6:00 PM",name:"Gym Session",done:false}
  ]
};

let state = load();

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function load(){
  return JSON.parse(localStorage.getItem(STORE_KEY)) || defaultState;
}

function update(fn){
  state = fn(state);
  save();
  render();
}

/* =========================
   UI LOGIC
========================= */

function render(){

  // cycle info
  const start = new Date(state.cycleStart);
  const today = new Date();
  const days = Math.floor((today - start)/86400000)+1;
  document.getElementById("cycleInfo").innerText =
    `Week ${Math.ceil(days/7)} • Day ${days}`;

  // schedule
  const el = document.getElementById("schedule");
  el.innerHTML = "";

  let done = 0;

  state.schedule.forEach((t,i)=>{
    if(t.done) done++;

    el.innerHTML += `
      <div class="flex justify-between items-center p-2 rounded-xl bg-white/5 mb-2">
        <div>
          <div class="text-sm font-medium">${t.time}</div>
          <div class="text-xs text-gray-400">${t.name}</div>
        </div>

        <input type="checkbox" ${t.done?"checked":""}
        onchange="toggle(${i})"/>
      </div>
    `;
  });

  document.getElementById("progress").innerText =
    Math.round((done/state.schedule.length)*100) + "%";
}

/* =========================
   ACTIONS
========================= */

function toggle(i){
  update(s=>{
    s.schedule[i].done = !s.schedule[i].done;
    return s;
  });
}

function calcMacros(){
  const w = +document.getElementById("weight").value || 180;
  const goal = document.getElementById("goal").value;

  let cals = w * 14;

  if(goal==="Cut") cals *= .85;
  if(goal==="Bulk") cals *= 1.15;

  document.getElementById("macroOut").innerHTML =
    `Calories: ${Math.round(cals)}<br>
     Protein: ${Math.round(w*1.8)}g`;
}

function saveCycle(){
  update(s=>{
    s.cycleStart = document.getElementById("cycleStart").value;
    return s;
  });
}

function resetData(){
  if(confirm("Reset everything?")){
    localStorage.removeItem(STORE_KEY);
    location.reload();
  }
}

/* =========================
   TABS
========================= */

function switchTab(i){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab")[i].classList.add("active");
}

/* INIT */
render();
switchTab(0);

</script>

</body>
</html>
